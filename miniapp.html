      --muted: #c9b8e8;

    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Poppins", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    body {
      opacity: 0;

    }
    @keyframes fadeInBody {
      to { opacity: 1; }

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 18px max(32px, env(safe-area-inset-bottom));

      margin: 0 auto;
      text-align: center;
    }
    #currency-screen.hidden {
      display: none;
    }
    #currency-screen .hero-title {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
    }
    #currency-screen .hero-sub {

      font-size: 0.95rem;
      color: var(--muted);
    }
    #currency-screen .prompt {

      color: var(--text);
      font-weight: 600;
    }

      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .currency-btn {

      font-size: 1.05rem;
      font-weight: 700;
      padding: 18px 20px;
      border-radius: 14px;
      border: 2px solid var(--gold);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .currency-btn:active {
      transform: scale(0.98);
    }
    @media (hover: hover) {
      .currency-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(255, 215, 0, 0.18);
        background: rgba(255, 215, 0, 0.08);
      }
    }

      position: relative;
      padding-top: 44px;
    }

      display: none;
    }

      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;

      background: rgba(26, 5, 51, 0.92);
      color: var(--gold);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);

    .wrap {

      margin: 0 auto;
      padding: 12px 14px 28px;

    header.hero {
      text-align: center;

      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);

      font-weight: 400;

    .grid {

      gap: 12px;
    }
    .card {
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;

    }

      color: var(--gold);

  </style>
</head>

      tg.ready();
      tg.expand();
      tg.setHeaderColor("#1a0533");
      tg.setBackgroundColor("#1a0533");

      /* const stripe = Stripe("pk_live_..."); */
    }

    /** Текущая валюта из localStorage или null, пока пользователь не выбрал. */
    let currentCurrency = null;
    let selected = null;

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    /** Читаем сохранённую валюту; только USD и SEK считаются валидными. */
    function readStoredCurrency() {
      try {
        const v = (localStorage.getItem(LS_CURRENCY_KEY) || "").trim().toUpperCase();
        if (v === CURRENCY_USD || v === CURRENCY_SEK) return v;
      } catch (e) { /* приватный режим и т.п. */ }
      return null;
    }

    /** Сохраняем выбор валюты для следующих открытий Mini App. */
    function saveCurrency(code) {
      try {
        localStorage.setItem(LS_CURRENCY_KEY, code);
      } catch (e) { /* ignore */ }
      currentCurrency = code;
    }

    /** Текст цены на карточке и в деталях: $16 или 169 kr */
    function formatPrice(currency) {
      if (currency === CURRENCY_SEK) return "169 kr";
      return "$16";
    }

    /** Stripe: USD → buyUrl, SEK → buyUrlSEK */
    function paymentUrlForTrack(track, currency) {
      if (!track) return "";
      if (currency === CURRENCY_SEK) {
        const u = (track.buyUrlSEK || "").trim();
        if (u.startsWith("http://") || u.startsWith("https://")) return u;
      }
      const u = (track.buyUrl || "").trim();
      return u.startsWith("http://") || u.startsWith("https://") ? u : "";
    }

    function updateBadge() {
      const el = document.getElementById("currency-badge");
      if (!currentCurrency) return;
      el.textContent = currentCurrency === CURRENCY_SEK ? "SEK · 169 kr" : "USD · $16";
      el.title = "Change currency";
    }

    function showCurrencyScreen() {
      document.getElementById("currency-screen").classList.remove("hidden");
      document.getElementById("app-shell").classList.add("hidden");
      closeDetail();
    }

    function showAppShell() {
      document.getElementById("currency-screen").classList.add("hidden");
      document.getElementById("app-shell").classList.remove("hidden");
      updateBadge();
      renderGrid();
    }

    function pickCurrency(code) {
      saveCurrency(code);
      showAppShell();
    }

    function renderGrid() {
      if (!currentCurrency) return;
      const root = document.getElementById("track-grid");
      const priceStr = formatPrice(currentCurrency);
      root.innerHTML = tracks
        .map(
          (t) => `
        <article class="card" data-id="${t.id}" role="button" tabindex="0">
          <div class="card-img-wrap">
            <img src="${escapeHtml(t.cover)}" alt="" loading="lazy" />
            <span class="card-emoji">${t.emoji}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(t.shortName)}</div>
            <div class="card-price">${escapeHtml(priceStr)}</div>
          </div>
        </article>`
        )
        .join("");

      root.querySelectorAll(".card").forEach((el) => {
        const id = Number(el.getAttribute("data-id"));
        const open = () => openDetail(tracks.find((x) => x.id === id));
        el.addEventListener("click", open);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            open();
          }
        });
      });
    }

    function openDetail(track) {
      if (!track || !currentCurrency) return;
      selected = track;
      const panel = document.getElementById("detail-screen");
      document.getElementById("detail-cover").src = track.cover;
      document.getElementById("detail-cover").alt = track.shortName;
      document.getElementById("detail-title").textContent = `${track.emoji} ${track.fullTitle}`;
      document.getElementById("detail-desc").textContent = track.description;
      document.getElementById("detail-price").textContent = formatPrice(currentCurrency);
      panel.classList.add("open");
      panel.setAttribute("aria-hidden", "false");
    }

    function closeDetail() {
      const panel = document.getElementById("detail-screen");
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
    }

    document.getElementById("btn-curr-sek").addEventListener("click", () => pickCurrency(CURRENCY_SEK));
    document.getElementById("btn-curr-usd").addEventListener("click", () => pickCurrency(CURRENCY_USD));

    document.getElementById("currency-badge").addEventListener("click", () => {
      showCurrencyScreen();
    });

    document.getElementById("btn-back").addEventListener("click", closeDetail);

    document.getElementById("btn-buy").addEventListener("click", () => {
      if (!selected || !currentCurrency) return;
      const url = paymentUrlForTrack(selected, currentCurrency);
      if (!url) return;
      if (tg && typeof tg.openLink === "function") {
        tg.openLink(url);
      } else {
        window.open(url, "_blank", "noopener,noreferrer");
      }
    });

    document.getElementById("btn-preview").addEventListener("click", () => {
      if (tg && tg.showAlert) {
        tg.showAlert("Preview will be available in a future update.");
      } else {
        alert("Preview will be available in a future update.");
      }
    });

    document.getElementById("btn-close-app").addEventListener("click", () => {
      if (tg && typeof tg.close === "function") {
        tg.close();
      } else {
        closeDetail();
      }
    });

    /** Старт: если валюта уже в localStorage — сразу сетка, иначе экран выбора. */
    (function init() {
      const stored = readStoredCurrency();
      if (stored) {
        currentCurrency = stored;
        showAppShell();
      } else {
        showCurrencyScreen();
      }
    })();
  </script>
</body>
</html>
