# Publicerar endast Mini App (miniapp.html + covers/) till GitHub Pages — utan Flask/Railway för vetrinen.
name: Deploy Mini App (GitHub Pages)

on:
  workflow_dispatch: {}
  push:
    branches: ["main", "experiment"]
    paths:
      - "miniapp.html"
      - "website.html"
      - "about.html"
      - "index.html"
      - "covers/**"
      - "assets/**"
      - ".github/workflows/deploy-miniapp-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Tydligt fel om filen aldrig pushats till GitHub (annars misslyckas deploy eller ger 404).
      - name: Verify miniapp.html exists in repo root
        run: |
          if [ ! -f miniapp.html ]; then
            echo "::error::miniapp.html is missing at repository root. Add it, commit, and push."
            exit 1
          fi

      # Samla statiska filer i _site (GitHub Pages rot för denna deploy).
      - name: Build static site folder
        run: |
          mkdir -p _site/covers _site/assets
          cp miniapp.html _site/miniapp.html
          if [ -f website.html ]; then cp website.html _site/website.html; fi
          if [ -f about.html ]; then cp about.html _site/about.html; fi
          if [ -f index.html ]; then cp index.html _site/index.html; else cp miniapp.html _site/index.html; fi
          touch _site/.nojekyll
          if [ -d covers ]; then
            find covers -maxdepth 1 -type f -exec cp {} _site/covers/ \;
          fi
          if [ -d assets ]; then
            find assets -maxdepth 1 -type f -exec cp {} _site/assets/ \;
          fi
          echo "Published files:" && find _site -type f | head -50

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
