    :root {
      --bg: #1a0533;
      --gold: #ffd700;
      --text: #ffffff;
      --muted: #c9b8e8;
      --card-border: rgba(255, 215, 0, 0.35);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Poppins", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    /* Плавное появление при загрузке */
    body {
      opacity: 0;
      animation: fadeInBody 0.45s ease forwards;
    }
    @keyframes fadeInBody {
      to { opacity: 1; }
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 14px 28px;
      padding-bottom: max(28px, env(safe-area-inset-bottom));
    }
    header.hero {
      text-align: center;
      margin-bottom: 18px;
    }
    header.hero h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
    }
    header.hero p {
      margin: 6px 0 0;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 400;
    }
    /* Сетка карточек: две колонки, скролл страницы */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .card {
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(255, 215, 0, 0.14);
      touch-action: manipulation;
      user-select: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .card:active {
      transform: scale(0.97);
    }
    .card:active .card-img-wrap {
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.05),
        0 2px 8px rgba(0, 0, 0, 0.7),
        inset 0 0 48px rgba(0, 0, 0, 0.28);
    }
    .card:active .card-img-wrap img {
      filter: brightness(0.86);
    }
    @media (hover: hover) {
      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(255, 215, 0, 0.12);
        border-color: rgba(255, 215, 0, 0.55);
      }
    }
    .card-img-wrap {
      aspect-ratio: 1;
      background: #2a0f4a;
      position: relative;
      /* Тень под обложкой + лёгкая рамка, чтобы картинка «лежала» на фоне */
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        0 8px 22px rgba(0, 0, 0, 0.55);
      transition: box-shadow 0.18s ease;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.15s ease;
    }
    .card-emoji {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 1.25rem;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }
    .card-body {
      padding: 8px 10px 10px;
    }
    .card-title {
      font-size: 0.72rem;
      line-height: 1.25;
      color: var(--text);
      font-weight: 600;
      /* Полное имя как у .mp3 / обложки — переносим строки, не обрезаем */
      word-break: break-word;
    }
    .card-price {
      margin-top: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
    }
    /* Экран детали: выезжает справа */
    .screens {
      position: relative;
      overflow-x: hidden;
    }
    #detail-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 20;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #detail-screen.open {
      transform: translateX(0);
    }
    .detail-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 10px 14px 32px;
      padding-top: max(10px, env(safe-area-inset-top));
    }
    .back-row {
      margin-bottom: 10px;
    }
    .btn-back {
      background: transparent;
      border: none;
      color: var(--gold);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 4px;
    }
    .detail-cover {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      display: block;
      margin-bottom: 14px;
    }
    .detail-emoji-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold);
      margin: 0 0 12px;
      line-height: 1.35;
    }
    .detail-desc {
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--text);
      margin: 0 0 16px;
      white-space: pre-wrap;
    }
    .detail-price {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 18px;
    }
    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-buy {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: var(--gold);
      color: #1a0533;
      animation: pulseBuy 2.2s ease-in-out infinite;

    @keyframes pulseBuy {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.45); }

    .btn-preview {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid var(--gold);
      background: transparent;
      color: var(--gold);
      cursor: pointer;

    let selected = null;

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderGrid() {
      const root = document.getElementById("track-grid");
      root.innerHTML = tracks
        .map(
          (t) => `
        <article class="card" data-id="${t.id}" role="button" tabindex="0">
          <div class="card-img-wrap">
            <img src="${escapeHtml(t.cover)}" alt="" loading="lazy" />
            <span class="card-emoji">${t.emoji}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(t.fullTitle)}</div>
            <div class="card-price">${escapeHtml(t.price)}</div>
          </div>
        </article>`
        )
        .join("");

      root.querySelectorAll(".card").forEach((el) => {
        const id = Number(el.getAttribute("data-id"));
        const open = () => openDetail(tracks.find((x) => x.id === id));
        el.addEventListener("click", open);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            open();
          }
        });
      });
    }

    function openDetail(track) {
      if (!track) return;
      selected = track;
      const panel = document.getElementById("detail-screen");
      document.getElementById("detail-cover").src = track.cover;
      document.getElementById("detail-cover").alt = track.fullTitle;
      document.getElementById("detail-title").textContent = `${track.emoji} ${track.fullTitle}`;
      document.getElementById("detail-desc").textContent = track.description;
      document.getElementById("detail-price").textContent = track.price;
      panel.classList.add("open");
      panel.setAttribute("aria-hidden", "false");
    }

    function closeDetail() {
      const panel = document.getElementById("detail-screen");
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
    }

    document.getElementById("btn-back").addEventListener("click", closeDetail);

    document.getElementById("btn-buy").addEventListener("click", () => {
      if (!selected || !selected.buyUrl) return;
      const url = String(selected.buyUrl).trim();
      if (!url.startsWith("http://") && !url.startsWith("https://")) return;
      if (tg && typeof tg.openLink === "function") {
        tg.openLink(url);
      } else {
        window.open(url, "_blank", "noopener,noreferrer");
      }
    });

    document.getElementById("btn-preview").addEventListener("click", () => {
      if (tg && tg.showAlert) {
        tg.showAlert("Preview will be available in a future update.");
      } else {

      }
    });

    document.getElementById("btn-close-app").addEventListener("click", () => {

        tg.close();
      } else {
        closeDetail();
