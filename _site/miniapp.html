    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Poppins", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;

      flex-direction: column;
      align-items: center;
      justify-content: center;

      margin: 0 auto;
      text-align: center;

    }

      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
    }
    #currency-screen .hero-sub {

      font-size: 0.95rem;
      color: var(--muted);

      font-size: 1rem;
      color: var(--text);
      font-weight: 600;

      flex-direction: column;

    }

      font-size: 1.05rem;
      font-weight: 700;
      padding: 18px 20px;
      border-radius: 14px;
      border: 2px solid var(--gold);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .currency-btn:active {
      transform: scale(0.98);
    }

        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(255, 215, 0, 0.18);

      padding-top: 44px;

      display: none;
    }

      left: 0;
      right: 0;

      font-weight: 700;
      text-align: center;
      color: #ffb3b3;
      background: #5c1515;

    }

    }

      right: max(10px, env(safe-area-inset-right));

      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: rgba(26, 5, 51, 0.92);
      color: var(--gold);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;

      transform: scale(0.96);
    }
    .wrap {

      margin: 0 auto;
      padding: 12px 14px 28px;

      font-weight: 700;

      color: var(--muted);
      font-weight: 400;

    .card {

      background: rgba(255, 255, 255, 0.04);

      cursor: pointer;

        border-color: rgba(255, 215, 0, 0.55);

    .card-img-wrap {

      background: #2a0f4a;
      position: relative;
      border-radius: 50%;

      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.15s ease;

      right: 6px;

      font-weight: 600;

      word-break: break-word;

    .card-duration {

      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      line-height: 1.2;

    .card-price {

      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);

    #detail-screen {

      background: var(--bg);

      pointer-events: none;

      font-size: 1rem;
      font-weight: 600;

      border-radius: 50%;

      font-weight: 700;
      color: var(--gold);
      margin: 0 0 12px;
      line-height: 1.35;

      font-weight: 600;
      color: var(--muted);

    .btn-row {

    .btn-buy {

      font-size: 1rem;
      font-weight: 700;
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: var(--gold);
      color: #1a0533;

    .btn-preview {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid var(--gold);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
    }
  </style>
</head>

      { id: 2, emoji: "🌸", shortName: "Estrogen", fullTitle: "Divine sound Estrogen from God", description: "Support feminine balance, harmony, and natural flow.\nGentle frequencies designed to support feminine hormonal balance and well-being. Encourages harmony, vitality, and inner softness. Ideal for restoring natural flow and emotional balance. Listen daily for best results.", cover: "covers/Divine-sound-Estrogen-from-God.png" },

        return (q.get("bot_username") || "").trim().replace(/^@/, "");

    /**
     * Данные пользователя из Mini App: обычно в initDataUnsafe; если пусто — парсим initData (строка query).

      if (!webApp) return null;
      const u = webApp.initDataUnsafe && webApp.initDataUnsafe.user;
      if (u && u.id != null) return u;
      const raw = (webApp.initData || "").trim();
      if (!raw) return null;
      try {
        const params = new URLSearchParams(raw);
        const userJson = params.get("user");
        if (!userJson) return null;
        const parsed = JSON.parse(userJson);
        return parsed && parsed.id != null ? parsed : null;
      } catch (e) {
        return null;
      }
    }

    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#1a0533");
      tg.setBackgroundColor("#1a0533");
    }

    /** Ответ GET /miniapp-pricing с Railway: цены и флаг теста (или null при ошибке сети). */
    let serverPricing = null;

    /** Текущая валюта из localStorage (по умолчанию USD). */
    let currentCurrency = CURRENCY_USD;
    let selected = null;
    let selectedGalleryCovers = [];
    /** Чтобы не отправить два checkout подряд (MainButton + HTML). */
    let checkoutInFlight = false;

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    /** Читаем сохранённую валюту; только USD и SEK считаются валидными. */
    function readStoredCurrency() {
      try {
        const v = (localStorage.getItem(LS_CURRENCY_KEY) || "").trim().toUpperCase();
        if (v === CURRENCY_USD || v === CURRENCY_SEK) return v;
      } catch (e) { /* приватный режим и т.п. */ }
      return null;
    }

    /** Сохраняем выбор валюты для следующих открытий Mini App. */
    function saveCurrency(code) {
      try {
        localStorage.setItem(LS_CURRENCY_KEY, code);
      } catch (e) { /* ignore */ }
      currentCurrency = code;
    }

    /** Текст цены на карточке и в деталях: с backend или запасной вариант. */
    function formatPrice(currency) {
      if (serverPricing) {
        return currency === CURRENCY_SEK ? serverPricing.sek_display : serverPricing.usd_display;
      }
      if (currency === CURRENCY_SEK) return "169 kr";
      return "$16";
    }

    /** Берём из query (бот открывает ссылку с checkout_api=) и кладём в sessionStorage. */
    function syncCheckoutParamsFromUrl() {
      try {
        const q = new URLSearchParams(window.location.search);
        const api = (q.get("checkout_api") || "").trim();
        const sec = (q.get("checkout_secret") || "").trim();
        if (api) sessionStorage.setItem(LS_CHECKOUT_API, api);
        if (sec) sessionStorage.setItem(LS_CHECKOUT_SECRET, sec);
      } catch (e) { /* ignore */ }
    }

    function getCheckoutApiBase() {
      try {
        const fromStore = (sessionStorage.getItem(LS_CHECKOUT_API) || "").trim().replace(/\/$/, "");
        if (fromStore) return fromStore;
      } catch (e) { /* ignore */ }
      return DEFAULT_PAYMENT_SERVER_URL.replace(/\/$/, "");
    }

    function getMiniappCheckoutSecretForHeader() {
      try {
        return (sessionStorage.getItem(LS_CHECKOUT_SECRET) || "").trim();
      } catch (e) {
        return "";
      }
    }

    function updateBadge() {
      const el = document.getElementById("currency-badge");
      if (!el) return;
      if (!currentCurrency) return;
      if (serverPricing) {
        el.textContent = currentCurrency === CURRENCY_SEK ? serverPricing.badge_sek : serverPricing.badge_usd;
      } else {
        el.textContent = currentCurrency === CURRENCY_SEK ? "SEK · 169 kr" : "USD · $16";
      }
      el.title = "Change currency";
    }

    /** Подтягиваем цены с web-сервиса (TEST_MODE на Railway). */
    async function loadServerPricing() {
      try {
        const base = getCheckoutApiBase();
        const controller = new AbortController();
        const tId = setTimeout(() => controller.abort(), 8000);
        const r = await fetch(`${base}/miniapp-pricing`, {
          method: "GET",
          mode: "cors",
          signal: controller.signal,
        });
        clearTimeout(tId);
        if (!r.ok) return;
        serverPricing = await r.json();
      } catch (e) {
        serverPricing = null;
      }
    }

    function syncTestModeBanner() {
      const el = document.getElementById("test-mode-banner");
      if (!el) return;
      const on = Boolean(serverPricing && serverPricing.test_mode);
      el.classList.toggle("show", on);
      document.body.classList.toggle("has-test-banner-padding", on);
    }

    /** Длительности с backend (/miniapp-pricing) — совпадают с id карточек в `tracks`. */
    function mergeTrackDurationsFromServer() {
      const rows =
        serverPricing && Array.isArray(serverPricing.track_durations) ? serverPricing.track_durations : [];
      const byId = {};
      rows.forEach((row) => {
        if (row && row.id != null && row.label) byId[row.id] = row.label;
      });
      tracks.forEach((t) => {
        t.durationLabel = byId[t.id] || null;
      });
    }

    function showAppShell() {
      const shell = document.getElementById("app-shell");
      if (shell) {
        shell.classList.remove("hidden");
        shell.setAttribute("aria-hidden", "false");
      }
      syncTestModeBanner();
      mergeTrackDurationsFromServer();
      renderGrid();
    }

    function renderGrid() {
      const root = document.getElementById("track-grid");
      const priceStr = formatPrice(currentCurrency);
      root.innerHTML = tracks
        .map(
          (t) => `
        <article class="card" data-id="${t.id}" role="button" tabindex="0">
          <div class="card-img-wrap">
            <img src="${escapeHtml(t.cover)}" alt="" loading="lazy" />
            <span class="card-emoji">${t.emoji}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(t.fullTitle)}</div>
            ${t.durationLabel ? `<div class="card-duration">⏱ ${escapeHtml(t.durationLabel)}</div>` : ""}
            <div class="card-price">${t.isFree ? "🎁 FREE" : escapeHtml(priceStr)}</div>
          </div>
        </article>`
        )
        .join("");

      root.querySelectorAll(".card").forEach((el) => {
        const id = Number(el.getAttribute("data-id"));
        const open = () => openDetail(tracks.find((x) => x.id === id));
        el.addEventListener("click", open);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            open();
          }
        });
      });
    }

    /**
     * Оставляем только одну кнопку Buy (HTML внутри карточки).
     * Telegram MainButton здесь отключаем, чтобы не было дублирования.
     */
    function syncMainButtonForDetail(open) {
      if (!tg || !tg.MainButton) return;
      tg.MainButton.hide();
    }

    function openDetail(track) {
      if (!track || !currentCurrency) return;
      selected = track;
      selectedGalleryCovers = Array.isArray(track.galleryCovers) && track.galleryCovers.length ? track.galleryCovers : [track.cover];
      const panel = document.getElementById("detail-screen");
      document.getElementById("detail-cover").src = track.cover;
      document.getElementById("detail-cover").alt = track.fullTitle;
      document.getElementById("detail-title").textContent = `${track.emoji} ${track.fullTitle}`;
      const durEl = document.getElementById("detail-duration");
      if (durEl) {
        if (track.durationLabel) {
          durEl.textContent = `⏱ ${track.durationLabel}`;
          durEl.style.display = "block";
        } else {
          durEl.textContent = "";
          durEl.style.display = "none";
        }
      }
      document.getElementById("detail-desc").textContent = track.description;
      document.getElementById("detail-price").textContent = track.isFree ? "🎁 FREE" : formatPrice(currentCurrency);
      // Для бесплатного трека показываем одну кнопку подарка, а валюты скрываем.
      const freeBtn = document.getElementById("btn-free-track");
      const currencyTitle = document.querySelector(".currency-choice-title");
      const currencyRow = document.querySelector(".currency-choice-row");
      if (track.isFree) {
        if (currencyTitle) currencyTitle.style.display = "none";
        if (currencyRow) currencyRow.style.display = "none";
        if (freeBtn) freeBtn.style.display = "block";
      } else {
        if (currencyTitle) currencyTitle.style.display = "";
        if (currencyRow) currencyRow.style.display = "";
        if (freeBtn) freeBtn.style.display = "none";
      }
      panel.classList.add("open");
      panel.setAttribute("aria-hidden", "false");
      syncMainButtonForDetail(true);
    }

    function closeDetail() {
      const panel = document.getElementById("detail-screen");
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
      syncMainButtonForDetail(false);
    }

    function openGalleryModal() {
      if (!selectedGalleryCovers.length) return;
      const modal = document.getElementById("gallery-modal");
      const grid = document.getElementById("gallery-grid");
      if (!modal || !grid) return;
      grid.innerHTML = selectedGalleryCovers
        .map((src, i) => {
          const cls = i === 0 ? "gallery-cover-cd" : "gallery-cover-case";
          const alt = i === 0 ? "Round CD artwork" : "CD jewel case photo";
          return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" class="${cls}" loading="lazy" />`;
        })
        .join("");
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeGalleryModal() {
      const modal = document.getElementById("gallery-modal");
      if (!modal) return;
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    document.getElementById("btn-back").addEventListener("click", closeDetail);
    document.getElementById("detail-cover").addEventListener("click", () => {
      if (selected && selected.isFree && selectedGalleryCovers.length > 1) {
        openGalleryModal();
      }
    });
    document.getElementById("gallery-close").addEventListener("click", closeGalleryModal);
    document.getElementById("gallery-modal").addEventListener("click", (e) => {
      if (e.target && e.target.id === "gallery-modal") {
        closeGalleryModal();
      }
    });

    /** Tid i ms: annars kan fetch hänga i WebView och MainButton snurrar för evigt. */
    const CHECKOUT_FETCH_TIMEOUT_MS = 45000;
    const WARMUP_FETCH_TIMEOUT_MS = 30000;

    /** Kort text om betal-URL (för felsökning utan att spamma hela querysträngar). */
    function checkoutHostHint(apiBase) {
        try {
          const u = new URL(apiBase.startsWith("http") ? apiBase : `https://${apiBase}`);
          return u.host || apiBase;
        } catch (e) {
          return String(apiBase || "").slice(0, 80);
        }
    }

    /**
     * Один fetch с таймаутом через AbortController.
     * Нужен для повторного использования в checkout и прогреве backend.
     */
    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timerId = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...(options || {}), signal: controller.signal });
      } finally {
        clearTimeout(timerId);
      }
    }

    /**
     * Прогрев web-сервиса на Railway перед checkout.
     * Если backend спал, первый запрос может падать; после /miniapp-pricing сервис обычно «просыпается».
     */
    async function warmupPaymentApi(apiBase) {
      try {
        await fetchWithTimeout(
          `${apiBase}/miniapp-pricing`,
          { method: "GET", mode: "cors" },
          WARMUP_FETCH_TIMEOUT_MS
        );
      } catch (e) {
        /* Прогрев best-effort: молча продолжаем, чтобы не блокировать checkout. */
      }
    }

    async function startCheckout(forcedCurrency) {
      if (checkoutInFlight) return;
      if (!selected) {
        if (tg && tg.showAlert) tg.showAlert("Pick a track first, then tap Buy.");
        return;
      }
      if (selected && selected.isFree) {
        // Бесплатный трек: открываем чат бота и просим выдать подарок.
        if (!BOT_USERNAME) {
          if (tg && tg.showAlert) tg.showAlert("Please open this store from the bot so it can deliver the free track.");
          return;
        }
        const deep = `https://t.me/${BOT_USERNAME}?start=gift_free_track`;
        if (tg && typeof tg.openTelegramLink === "function") {
          tg.openTelegramLink(deep);
        } else {
          window.location.href = deep;
        }
        return;
      }
      const apiBase = getCheckoutApiBase();
      const u = getTelegramUserFromWebApp(tg);
      const telegram_id = u && u.id;
      const telegram_name =
        [u && u.first_name, u && u.last_name].filter(Boolean).join(" ") || (u && u.username) || "Telegram user";
      if (!telegram_id) {
        if (tg && tg.showAlert) tg.showAlert("Open this app inside Telegram to purchase.");
        else alert("Open this app inside Telegram to purchase.");
        return;
      }

      const mb = tg && tg.MainButton;
      const stopCheckoutSpinner = () => {
        checkoutInFlight = false;
        if (mb && typeof mb.hideProgress === "function") mb.hideProgress();
        if (mb && typeof mb.enable === "function") mb.enable();
      };

      checkoutInFlight = true;
      if (mb && typeof mb.showProgress === "function") mb.showProgress();

      try {
        const chosenCurrency =
          forcedCurrency === CURRENCY_SEK || forcedCurrency === CURRENCY_USD
            ? forcedCurrency
            : (currentCurrency || CURRENCY_USD);
        saveCurrency(chosenCurrency);
        updateBadge();
        const currency = chosenCurrency === CURRENCY_SEK ? "sek" : "usd";
        const headers = { "Content-Type": "application/json" };
        const sec = getMiniappCheckoutSecretForHeader();
        if (sec) headers["X-Miniapp-Checkout-Secret"] = sec;
        if (typeof window !== "undefined" && window.location && window.location.protocol === "https:" && apiBase.startsWith("http://")) {
          if (tg && tg.showAlert) {
            tg.showAlert(
              "The store is on HTTPS but the payment API URL is HTTP — the browser blocks that. Set BACKEND_URL to https://… on Railway (bot + Web) and open the store again from the bot so checkout_api updates."
            );
          }
          return;
        }

        const requestOptions = {
          method: "POST",
          mode: "cors",
          headers,
          body: JSON.stringify({
            track_id: selected.id,
            telegram_id,
            telegram_name,
            currency,
          }),
        };
        let res;
        try {
          res = await fetchWithTimeout(
            `${apiBase}${PAYMENT_CREATE_PATH}`,
            requestOptions,
            CHECKOUT_FETCH_TIMEOUT_MS
          );
        } catch (e) {
          // Если web «просыпается», делаем прогрев и один повтор запроса.
          await warmupPaymentApi(apiBase);
          res = await fetchWithTimeout(
            `${apiBase}${PAYMENT_CREATE_PATH}`,
            requestOptions,
            CHECKOUT_FETCH_TIMEOUT_MS
          );
        }

        if (!res.ok) {
          let bodyHint = "";
          try {
            const t = (await res.text()).trim();
            if (t) bodyHint = t.length > 220 ? `${t.slice(0, 220)}…` : t;
          } catch (e2) {
            bodyHint = "";
          }
          const host = checkoutHostHint(apiBase);
          const tip401 =
            res.status === 401
              ? "\n\nHTTP 401: MINIAPP_CHECKOUT_SECRET on Railway Web must match the secret in the bot WebApp URL (?checkout_secret=…). Open the store again from the bot after changing env."
              : "";
          const tip502 =
            res.status === 502 || res.status === 503
              ? "\n\nServer error: check Railway Web logs, STRIPE_SECRET_KEY, and that Stripe is reachable."
              : "";
          const msg = `Could not start checkout (HTTP ${res.status} from ${host}).${tip401}${tip502}${
            bodyHint ? `\n\nServer said:\n${bodyHint}` : "\n\nTip: open Railway → Web → Logs while you tap Buy."
          }`;
          if (tg && tg.showAlert) tg.showAlert(msg);
          else alert(msg);
          return;
        }

        let data;
        try {
          data = await res.json();
        } catch (e) {
          const msg =
            "The payment server answered but the response was not valid JSON. Check Railway Web logs for /create-payment errors.";
          if (tg && tg.showAlert) tg.showAlert(msg);
          else alert(msg);
          return;
        }

        const payUrl = data && data.url;
        if (!payUrl || typeof payUrl !== "string") {
          const msg =
            "Payment server did not return a checkout URL. Check Railway Web: Stripe keys, DOMAIN, and logs for /create-payment.";
          if (tg && tg.showAlert) tg.showAlert(msg);
          else alert(msg);
          return;
        }

        /* Stripe: öppna i extern webbläsare (snurran stoppas i finally). */
        if (tg && typeof tg.openLink === "function") {
          try {
            tg.openLink(payUrl, { try_instant_view: false });
          } catch (e) {
            try {
              tg.openLink(payUrl);
            } catch (e2) {
              const msg =
                "Telegram could not open the payment link. Try: Settings → disable data saver / VPN; update Telegram; or open the Mini App from Wi‑Fi.";
              if (tg && tg.showAlert) tg.showAlert(msg);
              else alert(msg);
            }
          }
          /* Не показываем отложенный alert после openLink: в WebView Stripe часто открывается поверх Mini App — старый setTimeout давал ложное «не открылось». */
        } else {
          window.open(payUrl, "_blank", "noopener,noreferrer");
        }
        return;
      } catch (e) {
        const origin = typeof window !== "undefined" && window.location ? String(window.location.origin || "") : "";
        const host = checkoutHostHint(apiBase);
        const errMsg =
          e && e.name === "AbortError"
            ? `timeout after ${CHECKOUT_FETCH_TIMEOUT_MS / 1000}s — no answer from ${host}`
            : e && e.message
              ? String(e.message)
              : "unknown error";
        const corsHint = origin
          ? `Request failed: ${errMsg}\n\nStore origin: ${origin}\nPayment API: ${host}\n\nIf this is CORS: Railway → Web → Variables → MINIAPP_CORS_ORIGINS = exactly:\n${origin}\n\nIf timeout: Web service may be sleeping/crashed — open Railway Web logs and redeploy Web.`
          : `Request failed: ${errMsg}. Check payment API host and CORS.`;
        if (tg && tg.showAlert) tg.showAlert(corsHint);
        else alert(corsHint);
      } finally {
        /* Alltid stoppa snurran (även om openLink kastar eller vi returnerade tidigare). */
        stopCheckoutSpinner();
      }
    }

    document.getElementById("btn-buy-usd").addEventListener("click", () => {
      startCheckout(CURRENCY_USD);
    });
    document.getElementById("btn-buy-sek").addEventListener("click", () => {
      startCheckout(CURRENCY_SEK);
    });
    document.getElementById("btn-free-track").addEventListener("click", () => {
      startCheckout(CURRENCY_USD);
    });

    document.getElementById("btn-back-to-tracks").addEventListener("click", () => {
      closeDetail();
    });

    /** Старт: параметры checkout из URL; цены с backend; валюта из localStorage. */
    (async function init() {
      syncCheckoutParamsFromUrl();
      await loadServerPricing();
      syncTestModeBanner();
      currentCurrency = readStoredCurrency() || CURRENCY_USD;
      showAppShell();
    })();
  </script>
</body>
</html>
